services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev.api
    ports:
      - "4000:4000"
    volumes:
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
    develop:
      watch:
        - action: sync
          path: ./apps/api
          target: /app/apps/api
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    env_file:
      - apps/api/.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev:api
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev.web
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
    develop:
      watch:
        - action: sync
          path: ./apps/web
          target: /app/apps/web
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    env_file:
      - apps/web/.env
    environment:
      - INTERNAL_USER_URL=http://api:4000/api/users
      - WATCHPACK_POLLING=true
    command: npm run dev:web
    depends_on:
      - api

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=people-orbit-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
